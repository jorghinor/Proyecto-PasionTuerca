services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: pasion
      POSTGRES_USER: pasion
      POSTGRES_PASSWORD: pasion
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 5434:5432

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pasion
      SPRING_DATASOURCE_USERNAME: pasion
      SPRING_DATASOURCE_PASSWORD: pasion
      PASION_UPLOADS_DIR: uploads
    ports:
      - 8081:8080
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build: ./frontend
    ports:
      - 5173:5173
    depends_on:
      - backend

volumes:
  db-data:
